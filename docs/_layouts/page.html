---
layout: base
---
<main class="page-main">
  <div class="container">
    {% if page.back_link %}
    <a href="{{ page.back_link | relative_url }}" class="back-link">← {{ page.back_label | default: "Back" }}</a>
    {% endif %}
    <article class="prose">
      {% if page.title and page.hide_title != true %}
      <h1>{{ page.title }}</h1>
      {% endif %}
      {{ content }}
    </article>
  </div>
</main>
