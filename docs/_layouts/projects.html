---
layout: base
---
<div class="md:w-4/5 mx-auto my-10 px-4">
  <h1 class="text-3xl font-light text-center mb-10">Projects</h1>
  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;">
    {% for project in site.data.projects.projects %}
    <a href="{{ project.url }}" style="aspect-ratio: 1; text-decoration: none; {% if project.image %}background-image: url('{{ project.image }}'); background-size: cover; background-position: center;{% endif %}" class="relative flex items-center justify-center shadow-md overflow-hidden">
      {% if project.image %}<div style="position:absolute;inset:0;background:rgba(0,0,0,0.4);"></div>{% endif %}
      <span style="position:relative;z-index:1;" class="text-center text-sm md:text-base font-semibold {% if project.image %}text-white{% else %}text-slate-700 dark:text-slate-200{% endif %} px-2">{{ project.name }}</span>
    </a>
    {% endfor %}
  </div>
</div>
