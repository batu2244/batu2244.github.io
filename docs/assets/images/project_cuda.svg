<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 936 682" width="936" height="682">
  <defs>
    <linearGradient id="bgCuda" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a10"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="coreActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76c442"/>
      <stop offset="100%" style="stop-color:#4a9e1f"/>
    </linearGradient>
    <linearGradient id="coreMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ea8e0"/>
      <stop offset="100%" style="stop-color:#1a7ab0"/>
    </linearGradient>
    <linearGradient id="coreIdle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2240"/>
    </linearGradient>
    <linearGradient id="barGpu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76c442"/>
      <stop offset="100%" style="stop-color:#4a9e1f"/>
    </linearGradient>
    <linearGradient id="barCublas" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea8e0"/>
      <stop offset="100%" style="stop-color:#1a7ab0"/>
    </linearGradient>
    <filter id="glowCuda">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="936" height="682" fill="url(#bgCuda)"/>

  <!-- Subtle scan lines -->
  <g opacity="0.04">
    <pattern id="lines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="936" height="1" fill="#76c442"/>
    </pattern>
    <rect width="936" height="682" fill="url(#lines)"/>
  </g>

  <!-- GPU chip outline -->
  <rect x="80" y="100" width="430" height="380" rx="16" fill="#050e1a" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="96" y="116" width="398" height="348" rx="10" fill="#060f1c" stroke="#0f2a45" stroke-width="1"/>
  <text x="295" y="148" text-anchor="middle" font-family="monospace" font-size="13" fill="#2ea8e0" letter-spacing="2" font-weight="bold">NVIDIA T4  ·  2560 CUDA cores</text>

  <!-- Grid of CUDA cores (8x10) -->
  <g transform="translate(106, 160)">
