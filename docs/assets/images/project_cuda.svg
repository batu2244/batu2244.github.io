  <!-- Legend for cores -->
  <g transform="translate(96, 390)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="url(#coreActive)"/>
    <text x="20" y="11" font-family="monospace" font-size="10" fill="#94a3b8">Active (tiled)</text>
    <rect x="120" y="0" width="14" height="14" rx="2" fill="url(#coreMid)"/>
    <text x="140" y="11" font-family="monospace" font-size="10" fill="#94a3b8">cuBLAS</text>
    <rect x="220" y="0" width="14" height="14" rx="2" fill="url(#coreIdle)"/>
    <text x="240" y="11" font-family="monospace" font-size="10" fill="#94a3b8">Idle</text>
  </g>

  <!-- Performance chart -->
  <g transform="translate(570, 100)">
    <text x="155" y="20" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8" letter-spacing="1">Throughput · 2048×2048</text>

    <!-- Bars -->
    <!-- CPU -->
    <rect x="0" y="50" width="30" height="230" rx="3" fill="#1e3a5f"/>
    <text x="15" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">CPU</text>
    <text x="15" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">1x</text>

    <!-- Naive CUDA -->
    <rect x="52" y="130" width="30" height="150" rx="3" fill="#0c4a6e"/>
    <text x="67" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Naive</text>
    <text x="67" y="124" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">4x</text>

    <!-- Tiled CUDA -->
    <rect x="104" y="80" width="30" height="200" rx="3" fill="url(#barGpu)" filter="url(#glowCuda)"/>
    <text x="119" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#76c442">Tiled</text>
    <text x="119" y="74" text-anchor="middle" font-family="monospace" font-size="9" fill="#76c442">12x</text>

    <!-- cuBLAS -->
    <rect x="156" y="40" width="30" height="240" rx="3" fill="url(#barCublas)" filter="url(#glowCuda)"/>
    <text x="171" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#2ea8e0">cuBLAS</text>
    <text x="171" y="34" text-anchor="middle" font-family="monospace" font-size="9" fill="#2ea8e0">18x</text>

    <!-- Axis -->
    <line x1="0" y1="280" x2="310" y2="280" stroke="#1e3a5f" stroke-width="1"/>
    <line x1="0" y1="50"  x2="0"   y2="280" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Image convolution section -->
    <text x="155" y="340" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Image convolution: 3x3 to 7x7 filters</text>
    <g transform="translate(10, 355)">
      <!-- edge detect bar -->
      <rect x="0" y="0" width="80" height="12" rx="3" fill="#1e3a5f"/>
      <rect x="0" y="0" width="26" height="12" rx="3" fill="#64748b"/>
      <text x="86" y="10" font-family="monospace" font-size="9" fill="#64748b">Edge</text>
      <!-- sharpen bar -->
      <rect x="0" y="18" width="80" height="12" rx="3" fill="#1e3a5f"/>
      <rect x="0" y="18" width="55" height="12" rx="3" fill="url(#barGpu)" opacity="0.8"/>
      <text x="86" y="28" font-family="monospace" font-size="9" fill="#76c442">Sharpen</text>
      <!-- blur bar -->
