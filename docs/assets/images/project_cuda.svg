  <!-- Title -->
  <text x="468" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" letter-spacing="0.5">CUDA Accelerated Python Library</text>
  <text x="468" y="608" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">C · CUDA · cuBLAS · Python · Tesla T4</text>
</svg>
