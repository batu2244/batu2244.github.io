    <rect x="216" y="0"  width="30" height="22" rx="3" fill="url(#coreActive)" filter="url(#glowCuda)"/>
    <rect x="252" y="0"  width="30" height="22" rx="3" fill="url(#coreActive)" filter="url(#glowCuda)"/>
