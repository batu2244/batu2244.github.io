    <rect x="36"  y="112" width="30" height="22" rx="3" fill="url(#coreMid)"    filter="url(#glowCuda)"/>
    <rect x="72"  y="112" width="30" height="22" rx="3" fill="url(#coreMid)"    filter="url(#glowCuda)"/>
    <rect x="108" y="112" width="30" height="22" rx="3" fill="url(#coreActive)" filter="url(#glowCuda)"/>
