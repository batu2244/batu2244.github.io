    <!-- Row 3 -->
    <rect x="0"   y="84" width="30" height="22" rx="3" fill="url(#coreMid)"    filter="url(#glowCuda)"/>
    <rect x="36"  y="84" width="30" height="22" rx="3" fill="url(#coreActive)" filter="url(#glowCuda)"/>
    <rect x="72"  y="84" width="30" height="22" rx="3" fill="url(#coreActive)" filter="url(#glowCuda)"/>
