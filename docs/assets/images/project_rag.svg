<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 936 682" width="936" height="682">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="936" height="682" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.12">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#94a3b8"/>
    </pattern>
    <rect width="936" height="682" fill="url(#dots)"/>
  </g>

  <!-- Documents (left side) -->
  <g transform="translate(120, 200)">
    <!-- Doc 3 (back) -->
    <rect x="20" y="20" width="140" height="180" rx="8" fill="url(#docGrad)" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
    <rect x="38" y="50" width="90" height="6" rx="3" fill="#64748b" opacity="0.8"/>
    <rect x="38" y="66" width="80" height="6" rx="3" fill="#64748b" opacity="0.6"/>
    <rect x="38" y="82" width="85" height="6" rx="3" fill="#64748b" opacity="0.5"/>
    <rect x="38" y="98" width="70" height="6" rx="3" fill="#64748b" opacity="0.4"/>

    <!-- Doc 2 (mid) -->
    <rect x="10" y="10" width="140" height="180" rx="8" fill="url(#docGrad)" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
    <rect x="28" y="40" width="90" height="6" rx="3" fill="#64748b"/>
    <rect x="28" y="56" width="80" height="6" rx="3" fill="#64748b" opacity="0.8"/>
    <rect x="28" y="72" width="85" height="6" rx="3" fill="#64748b" opacity="0.6"/>
    <rect x="28" y="88" width="70" height="6" rx="3" fill="#64748b" opacity="0.5"/>
    <rect x="28" y="104" width="60" height="6" rx="3" fill="#64748b" opacity="0.4"/>

    <!-- Doc 1 (front) -->
    <rect x="0" y="0" width="140" height="180" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="16" y="16" width="40" height="4" rx="2" fill="#3b82f6" opacity="0.9"/>
    <rect x="16" y="30" width="108" height="5" rx="2.5" fill="#94a3b8"/>
    <rect x="16" y="44" width="95" height="5" rx="2.5" fill="#94a3b8" opacity="0.8"/>
    <rect x="16" y="58" width="100" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
    <rect x="16" y="72" width="80" height="5" rx="2.5" fill="#94a3b8" opacity="0.6"/>
    <rect x="16" y="86" width="90" height="5" rx="2.5" fill="#94a3b8" opacity="0.5"/>
    <rect x="16" y="100" width="70" height="5" rx="2.5" fill="#94a3b8" opacity="0.4"/>
    <!-- highlight lines -->
    <rect x="16" y="44" width="60" height="5" rx="2.5" fill="#fbbf24" opacity="0.35"/>
    <rect x="16" y="72" width="50" height="5" rx="2.5" fill="#fbbf24" opacity="0.25"/>
    <text x="70" y="155" text-anchor="middle" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.8">PDF corpus</text>
  </g>

  <!-- FAISS vector store (center) -->
  <g transform="translate(380, 210)">
    <rect x="0" y="0" width="170" height="200" rx="12" fill="#0c1a2e" stroke="#6366f1" stroke-width="1.5"/>
    <text x="85" y="24" text-anchor="middle" font-family="monospace" font-size="11" fill="#6366f1" font-weight="bold">FAISS Index</text>
    <!-- Vector rows -->
    <g transform="translate(14, 36)">
      <rect x="0" y="0" width="142" height="18" rx="4" fill="#1e1b4b" opacity="0.8"/>
      <rect x="4" y="6" width="30" height="6" rx="3" fill="#6366f1" opacity="0.9"/>
      <rect x="38" y="6" width="20" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
      <rect x="62" y="6" width="25" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
      <rect x="91" y="6" width="18" height="6" rx="3" fill="#818cf8" opacity="0.7"/>
      <rect x="113" y="6" width="22" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    </g>
    <g transform="translate(14, 60)">
      <rect x="0" y="0" width="142" height="18" rx="4" fill="#1e1b4b" opacity="0.8"/>
      <rect x="4" y="6" width="22" height="6" rx="3" fill="#818cf8" opacity="0.7"/>
      <rect x="30" y="6" width="32" height="6" rx="3" fill="#6366f1" opacity="0.9"/>
      <rect x="66" y="6" width="18" height="6" rx="3" fill="#818cf8" opacity="0.5"/>
      <rect x="88" y="6" width="28" height="6" rx="3" fill="#6366f1" opacity="0.6"/>
      <rect x="120" y="6" width="16" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
    </g>
    <g transform="translate(14, 84)">
      <rect x="0" y="0" width="142" height="18" rx="4" fill="#312e81" opacity="0.6"/>
      <rect x="4" y="6" width="25" height="6" rx="3" fill="#a5b4fc" opacity="0.9"/>
      <rect x="33" y="6" width="18" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
      <rect x="55" y="6" width="30" height="6" rx="3" fill="#818cf8" opacity="0.7"/>
      <rect x="89" y="6" width="20" height="6" rx="3" fill="#a5b4fc" opacity="0.6"/>
      <rect x="113" y="6" width="22" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
      <!-- highlight: retrieved chunk -->
      <rect x="0" y="0" width="142" height="18" rx="4" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    </g>
    <g transform="translate(14, 108)">
      <rect x="0" y="0" width="142" height="18" rx="4" fill="#1e1b4b" opacity="0.8"/>
      <rect x="4" y="6" width="18" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
      <rect x="26" y="6" width="28" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
      <rect x="58" y="6" width="22" height="6" rx="3" fill="#6366f1" opacity="0.7"/>
      <rect x="84" y="6" width="30" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
      <rect x="118" y="6" width="18" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
    </g>
    <g transform="translate(14, 132)">
      <rect x="0" y="0" width="142" height="18" rx="4" fill="#1e1b4b" opacity="0.8"/>
      <rect x="4" y="6" width="30" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
      <rect x="38" y="6" width="20" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
      <rect x="62" y="6" width="26" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
      <rect x="92" y="6" width="18" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
      <rect x="114" y="6" width="22" height="6" rx="3" fill="#818cf8" opacity="0.3"/>
    </g>
    <text x="85" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1" opacity="0.7">vector embeddings</text>
  </g>

  <!-- Chat bubbles (right side) -->
  <g transform="translate(620, 170)">
    <!-- User question -->
    <rect x="30" y="0" width="200" height="52" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <rect x="46" y="14" width="120" height="7" rx="3.5" fill="#93c5fd"/>
    <rect x="46" y="28" width="90" height="7" rx="3.5" fill="#93c5fd" opacity="0.7"/>
    <circle cx="18" cy="26" r="12" fill="#334155"/>
    <text x="18" y="30" text-anchor="middle" font-size="12" fill="#94a3b8">?</text>

    <!-- Answer bubble -->
    <rect x="0" y="76" width="210" height="80" rx="12" fill="url(#bubbleGrad)" opacity="0.95"/>
    <rect x="16" y="92" width="140" height="6" rx="3" fill="white" opacity="0.9"/>
    <rect x="16" y="106" width="160" height="6" rx="3" fill="white" opacity="0.75"/>
    <rect x="16" y="120" width="130" height="6" rx="3" fill="white" opacity="0.6"/>
    <rect x="16" y="134" width="100" height="6" rx="3" fill="white" opacity="0.45"/>
    <circle cx="222" cy="116" r="12" fill="#3b82f6"/>
    <text x="222" y="120" text-anchor="middle" font-size="11" fill="white" font-weight="bold">AI</text>

    <!-- Second user -->
    <rect x="30" y="178" width="200" height="40" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <rect x="46" y="192" width="100" height="7" rx="3.5" fill="#93c5fd" opacity="0.7"/>
    <circle cx="18" cy="198" r="12" fill="#334155" opacity="0.7"/>
    <text x="18" y="202" text-anchor="middle" font-size="12" fill="#94a3b8">?</text>
  </g>

  <!-- Arrows: docs -> FAISS -->
  <g opacity="0.7" filter="url(#glow)">
    <line x1="270" y1="295" x2="378" y2="310" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="378,306 386,310 378,314" fill="#3b82f6"/>
  </g>

  <!-- Arrow: FAISS -> chat -->
  <g opacity="0.7" filter="url(#glow)">
    <line x1="552" y1="310" x2="618" y2="310" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="618,306 626,310 618,314" fill="#6366f1"/>
  </g>

  <!-- Labels -->
  <text x="295" y="288" font-family="monospace" font-size="10" fill="#3b82f6" opacity="0.8">embed + chunk</text>
  <text x="556" y="304" font-family="monospace" font-size="10" fill="#6366f1" opacity="0.8">retrieve</text>

  <!-- Title -->
  <text x="468" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" letter-spacing="0.5">Domain-Specific RAG Chatbot</text>
  <text x="468" y="608" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">OpenAI · FAISS · LlamaCpp · Python</text>
</svg>
